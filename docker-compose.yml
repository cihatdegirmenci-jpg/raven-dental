services:
  apache:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: raven-apache
    ports:
      - "8000:80"
    volumes:
      - ./code:/var/www/html
      - ./docker/apache-vhost.conf:/etc/apache2/sites-available/000-default.conf:ro
      - ./docker/php-custom.ini:/usr/local/etc/php/conf.d/zz-custom.ini:ro
      - ./docker/entrypoint.sh:/usr/local/bin/raven-entrypoint.sh:ro
      - raven-storage:/var/www/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - raven-net
    entrypoint: ["/usr/local/bin/raven-entrypoint.sh"]
    command: ["apache2-foreground"]

  mysql:
    image: mysql:8.0
    container_name: raven-mysql
    ports:
      - "33060:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: ravenden_1
      MYSQL_USER: ravenden_1
      MYSQL_PASSWORD: ravenpw
    volumes:
      - raven-mysql-data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d:ro
    command: >
      --default-authentication-plugin=mysql_native_password
      --max_allowed_packet=64M
      --sql_mode=""
      --explicit_defaults_for_timestamp=OFF
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpw"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - raven-net

  phpmyadmin:
    image: phpmyadmin:5
    container_name: raven-pma
    ports:
      - "8001:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: rootpw
      UPLOAD_LIMIT: 200M
    depends_on:
      - mysql
    networks:
      - raven-net

volumes:
  raven-storage:
  raven-mysql-data:

networks:
  raven-net:
    driver: bridge
